version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: npm run dev
    working_dir: /app
    env_file:
      - ./server/.env
    environment:
      - CORS_ORIGIN=http://localhost:5173
    volumes:
      - ./server:/app
      - /app/node_modules
    ports:
      - "5001:5001"

  client:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5001/api
    volumes:
      - ./:/app
    depends_on:
      - server
    ports:
      - "5173:5173"
