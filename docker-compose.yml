version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    environment:
      - CORS_ORIGIN=http://localhost:8080
    ports:
      - "5001:5001"

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        VITE_API_BASE_URL: http://localhost:5001/api
    depends_on:
      - server
    ports:
      - "8080:80"
